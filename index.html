<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>FFT</title>
  </head>
  <body style="background-color: gray;">
    <script type="text/javascript">
    do {
      const fft = (() => {
        const fftWorker = new Worker("./worker.js");
        let count = 0;
        return (audioStepSize, data) => {
          const myId = count++;
          fftWorker.postMessage({ id: myId, audioStepSize, data });
          return new Promise(r => {
            const handler = (e) => {
              const { id, data } = e.data;
              if (id !== myId) return;
              fftWorker.removeEventListener("message", handler);
              r(data);
            };
            fftWorker.addEventListener("message", handler);
          })
        };
      })();

      async function getRawDataOfMusic(sampleRate, data) {
        const audioContext = new AudioContext({ sampleRate });
        const audioBuffer = await audioContext.decodeAudioData(data);
        return Array.from({ length: audioBuffer.numberOfChannels }, (_, i) => audioBuffer.getChannelData(i));
      }

      const windowLoadingPromise = new Promise(r => window.addEventListener("load", () => r()));

      function drawFFTOnCanvas(canvas, stftMagnitudesLog, maxValue, cursorX) {
        maxValue = Math.log(maxValue + 0.05);
        const minValue = Math.log(0 + 0.05);
        const ctx = canvas.getContext("2d");
        const imageData = ctx.createImageData(stftMagnitudesLog.length, 256);
        const { data, width, height } = imageData;
        for (let x = 0; x < width; x++) {
          const v = 256 * (Math.log(stftMagnitudesLog[x] + 0.05) - minValue) / (maxValue - minValue);
          let y;
          if (cursorX === x) {
            for (y = 0; y < v; y++) {
              const i = 4 * ((height - y) * width + x);
              data[i + 0] = 255;  // R value
              data[i + 1] = 0;    // G value
              data[i + 2] = 255;  // G value
              data[i + 3] = 255;  // A value
            }
            for (; y < height; y++) {
              const i = 4 * ((height - y) * width + x);
              data[i + 0] = 255;  // R value
              data[i + 1] = 0;    // G value
              data[i + 2] = 0;    // B value
              data[i + 3] = 255;  // A value
            }
          } else {
            for (y = 0; y < v; y++) {
              const i = 4 * ((height - y) * width + x);
              data[i + 0] = 255;  // R value
              data[i + 1] = 255;  // G value
              data[i + 2] = 0;    // G value
              data[i + 3] = 255;  // A value
            }
            for (; y < height; y++) {
              const i = 4 * ((height - y) * width + x);
              data[i + 0] = 0;    // R value
              data[i + 1] = 0;    // G value
              data[i + 2] = 0;    // B value
              data[i + 3] = 255;  // A value
            }
          }
        }

        ctx.putImageData(imageData, 0, 0);
      }

      ~async function main() {
        const sampleRate = 8192;
        const audioStepSize = 256;

        await windowLoadingPromise;

        const input = document.createElement("input");
        input.type = "file";
        input.setAttribute("accept", "audio/aac,audio/midi,audio/x-midi,audio/mpeg,audio/ogg,audio/opus,audio/wav,audio/webm,audio/*");
        document.body.append(input);

        const loadingText = document.createElement("div");
        document.body.append(loadingText);
        loadingText.textContent = "input your audio data...";

        const canvas = document.createElement("canvas");
        document.body.append(canvas);

        const strength = document.createElement("div");
        document.body.append(strength);

        document.body.append(document.createElement("br"));

        const audio = new Audio();
        document.body.append(audio);
        audio.controls = true;

        let stftMagnitudesLog = [];
        let maxValue = -Infinity;
        let seeked = false;

        ~async function drawingLoop() {
          for (;;) {
            const t = (audio.currentTime / audioStepSize * sampleRate) >>> 0;
            if (t < stftMagnitudesLog.length) {
              drawFFTOnCanvas(canvas, stftMagnitudesLog[t], maxValue, cursorX);
              strength.textContent = Math.round(30 * stftMagnitudesLog[t][cursorX]);
            }
            await new Promise(requestAnimationFrame);
          }
        }();

        audio.addEventListener("seeked", () => {
          seeked = true;
        });

        let cursorX = 0;
        document.addEventListener("mousemove", e => {
          cursorX = e.screenX - canvas.getBoundingClientRect().x;
        });

        input.addEventListener("input", async e => {
          if (!input.files.length) return;
          loadingText.textContent = "Loading the data...";
          const data = await getRawDataOfMusic(sampleRate, await input.files[0].arrayBuffer());
          loadingText.textContent = "Analysing the data...";
          stftMagnitudesLog = await fft(audioStepSize, data);
          maxValue = -Infinity;
          for (let t = 0; t < stftMagnitudesLog.length; t++)
          for (let f = 0; f < stftMagnitudesLog[0].length; f++) {
            maxValue = Math.max(stftMagnitudesLog[t][f], maxValue);
          }
          loadingText.textContent = "Ready. Play the music.";
          try { URL.revokeObjectURL(audio.src); }
          catch(_) {}
          const audioSrc = audio.src = URL.createObjectURL(input.files[0]);
          const ctx = canvas.getContext("2d");
          canvas.width = stftMagnitudesLog[0].length;
          canvas.height = 256;
          ctx.fillStyle = "black";
          ctx.fillRect(0, 0, canvas.width, 256);
        });
      }();
    } while(0);
    </script>
  </body>
</html>
