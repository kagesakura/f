<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>FFT</title>
  </head>
  <body style="background-color: gray;">
    <script type="text/javascript">
    do {
      const audioStepSize = 128;

      const fft = (() => {
        const fftWorker = new Worker("./worker.js");
        let count = 0;
        return data => {
          const myId = count++;
          fftWorker.postMessage({ id: myId, audioStepSize, data });
          return new Promise(r => {
            const handler = (e) => {
              const { id, data } = e.data;
              if (id !== myId) return;
              fftWorker.removeEventListener("message", handler);
              r(data);
            };
            fftWorker.addEventListener("message", handler);
          })
        };
      })();

      async function getRawDataOfMusic(data) {
        const audioContext = new AudioContext({ sampleRate: 44100 });
        const audioBuffer = await audioContext.decodeAudioData(data);
        return Array.from({ length: audioBuffer.numberOfChannels }, (_, i) => audioBuffer.getChannelData(i));
      }

      const windowLoadingPromise = new Promise(r => window.addEventListener("load", () => r()));

      function drawFFTOnCanvas(canvas, stftMagnitudesLog, maxValue, minValue) {
        const ctx = canvas.getContext("2d");
        const imageData = ctx.createImageData(stftMagnitudesLog.length, 255);
        const { data } = imageData;

        for (let i = 0; i < imageData.data.length; i += 4) {
          const x = (i / 4) % imageData.width;
          const y = imageData.height - ((i / 4 / imageData.width) >>> 0);

          if (y < (stftMagnitudesLog[x] - minValue) / (maxValue - minValue) * 255) {
            // Modify pixel data
            imageData.data[i + 0] = 255;  // R value
            imageData.data[i + 1] = 255;  // G value
            imageData.data[i + 2] = 0;    // B value
            imageData.data[i + 3] = 255;  // A value
          } else {
            // Modify pixel data
            imageData.data[i + 0] = 0;    // R value
            imageData.data[i + 1] = 0;    // G value
            imageData.data[i + 2] = 0;    // B value
            imageData.data[i + 3] = 255;  // A value
          }
        }

        ctx.putImageData(imageData, 0, 0);
      }

      ~async function main() {
        await windowLoadingPromise;

        const input = document.createElement("input");
        input.type = "file";
        document.body.append(input);

        const loadingText = document.createElement("div");
        document.body.append(loadingText);
        loadingText.textContent = "input your audio data...";

        const canvas = document.createElement("canvas");
        document.body.append(canvas);

        const audio = new Audio();
        document.body.append(audio);
        audio.controls = true;

        let isStopRequested = false;
        input.addEventListener("input", async e => {
          if (!input.files.length) return;
          loadingText.textContent = "Loading the data...";
          const data = await getRawDataOfMusic(await input.files[0].arrayBuffer());
          loadingText.textContent = "Analysing the data...";
          const stftMagnitudesLog = await fft(data);
          let maxValue = -Infinity, minValue = +Infinity;
          for (let t = 0; t < stftMagnitudesLog.length; t++)
          for (let f = 0; f < stftMagnitudesLog[0].length; f++) {
            maxValue = Math.max(stftMagnitudesLog[t][f], maxValue);
            minValue = Math.min(stftMagnitudesLog[t][f], minValue);
          }
          loadingText.textContent = "Ready. Click or tap below.";
          isStopRequested = true;
          try { URL.revokeObjectURL(audio.src); }
          catch(_) {}
          const audioSrc = audio.src = URL.createObjectURL(input.files[0]);
          do {
            const ctx = canvas.getContext("2d");
            canvas.width = stftMagnitudesLog[0].length;
            canvas.height = 255;
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, 255);
          } while(0);
          canvas.addEventListener("click", async () => {
            if (audioSrc !== audio.src) return;
            isStopRequested = false;
            audio.play();
            while (!isStopRequested) {
              const t = ((audio.duration - startTime) / audioStepSize * 44100) >>> 0;
              if (t >= stftMagnitudesLog.length) break;
              drawFFTOnCanvas(canvas, stftMagnitudesLog[t], maxValue, minValue);
              await new Promise(requestAnimationFrame);
            }
          }, { once: true });
        });
      }();
    } while(0);
    </script>
  </body>
</html>
