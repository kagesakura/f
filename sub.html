<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body>
    <div id="p"></div>
    <script type="text/javascript">
      ~async function main() {
        const t = Date.parse("2006/01/12");
        const p = document.getElementById("p");
        for (;;) {
          p.textContent = ((Date.now() - t) / (1000 * 60 * 60 * 24 * 365)).toFixed(8);
          await new Promise(requestAnimationFrame);
        }
      }();
    </script>
  </body>
</html>
